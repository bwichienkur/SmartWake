name: smart_wake
description: SmartWake - Intelligent alarm clock with sleep stage estimation and wake-up challenges.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local storage (encrypted, offline-first)
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5

  # Networking & sync
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1

  # Subscriptions
  in_app_purchase: ^3.2.0

  # Alarms & notifications
  flutter_local_notifications: ^18.0.1
  android_alarm_manager_plus: ^4.0.4
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

  # Health & sensors
  health: ^13.1.4
  sensors_plus: ^6.1.1
  pedometer: ^4.0.2
  light: ^3.0.1

  # Challenges
  mobile_scanner: ^6.0.2
  google_mlkit_face_detection: ^0.12.0
  camera: ^0.11.0+2

  # Audio
  audioplayers: ^6.1.0
  vibration: ^2.0.0

  # UI
  fl_chart: ^0.69.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  # intl pinned by flutter_localizations
  uuid: ^4.5.1
  intl: any
  equatable: ^2.0.7
  collection: ^1.19.0
  json_annotation: ^4.9.0
  logger: ^2.5.0
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: assets/images/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/lottie/
