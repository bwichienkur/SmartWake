services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smsplatform
      POSTGRES_USER: sms
      POSTGRES_PASSWORD: sms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms -d smsplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: sms
      RABBITMQ_DEFAULT_PASS: sms

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      UseSqlite: "false"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=smsplatform;Username=sms;Password=sms"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: sms
      RabbitMQ__Password: sms
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID:-}
      Twilio__AuthToken: ${TWILIO_AUTH_TOKEN:-}
      Twilio__FromNumber: ${TWILIO_PHONE_NUMBER:-}
      Intelligence__Provider: ${AI_PROVIDER:-Heuristic}
      Intelligence__OpenAiApiKey: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      UseSqlite: "false"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=smsplatform;Username=sms;Password=sms"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: sms
      RabbitMQ__Password: sms
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
