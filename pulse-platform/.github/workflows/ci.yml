name: Pulse Platform CI

on:
  push:
    branches: [master, main, 'cursor/**']
    paths:
      - 'pulse-platform/**'
  pull_request:
    paths:
      - 'pulse-platform/**'

defaults:
  run:
    working-directory: pulse-platform

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pulse_test
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/backend/Pulse.sln

      - name: Build
        run: dotnet build src/backend/Pulse.sln --no-restore -c Release

      - name: Test
        run: dotnet test src/backend/Pulse.sln --no-build -c Release --verbosity normal
        env:
          ConnectionStrings__Default: Host=localhost;Port=5432;Database=pulse_test;Username=pulse;Password=pulse_test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pulse-platform/src/frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: pulse-platform/src/frontend

      - name: Lint
        run: npm run lint
        working-directory: pulse-platform/src/frontend

      - name: Build
        run: npm run build
        working-directory: pulse-platform/src/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infrastructure/docker/Dockerfile.api -t pulse-api:ci src/backend

      - name: Build Worker image
        run: docker build -f infrastructure/docker/Dockerfile.worker -t pulse-worker:ci src/backend
