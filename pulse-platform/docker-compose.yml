services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infrastructure/docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pulse
      MINIO_ROOT_PASSWORD: pulse_dev_secret
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./src/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=pulse;Username=pulse;Password=pulse_dev
      AutoMigrate: "true"
      Jwt__Secret: pulse-dev-secret-key-min-32-chars-long!!
      Cors__Origins__0: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./src/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.worker
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=pulse;Username=pulse;Password=pulse_dev
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./src/frontend
      dockerfile: ../../infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  postgres_data:
  clickhouse_data:
  minio_data:
