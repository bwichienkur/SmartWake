# Pulse Platform — Kubernetes Manifests (skeleton)

apiVersion: v1
kind: Namespace
metadata:
  name: pulse
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-api
  namespace: pulse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pulse-api
  template:
    metadata:
      labels:
        app: pulse-api
    spec:
      containers:
        - name: api
          image: pulse/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: database-url
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-api
  namespace: pulse
spec:
  selector:
    app: pulse-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-worker
  namespace: pulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-worker
  template:
    metadata:
      labels:
        app: pulse-worker
    spec:
      containers:
        - name: worker
          image: pulse/worker:latest
          env:
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: database-url
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pulse-api-hpa
  namespace: pulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pulse-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
